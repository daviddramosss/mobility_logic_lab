version: '3.8'

services:
  # ----------------------------------------
  # 1. Servicio de Ingesta (Go)
  # ----------------------------------------
  ingestion:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ENV=development

  # ----------------------------------------
  # 2. Servicio de Precios (Ruby)
  # ----------------------------------------
  pricing:
    build:
      context: ./services/pricing
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - ENV=development
